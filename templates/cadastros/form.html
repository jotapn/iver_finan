{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block page_title %}{{ cadastro_title }}{% endblock %}

{% block content %}
<div class="card shadow-sm border-0">
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            {{ form|crispy }}
            <div class="d-flex gap-2">
                <button class="btn btn-primary" type="submit">Salvar</button>
                <a class="btn btn-outline-secondary" href="{% url 'cadastros:list' cadastro_slug %}">Cancelar</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
